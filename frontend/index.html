<!DOCTYPE html>
<html>
<head>
<title>Employee App</title>
</head>
<body>

<h1>Employee Management</h1>

<input id="name" placeholder="Name">

<input id="department"
placeholder="Department">

<button onclick="saveEmployee()">
Save
</button>

<h2>Employees</h2>

<ul id="employees"></ul>

<script>

const API =
"http://18.223.113.10:5000";

async function loadEmployees(){

const response =
await fetch(API+"/employees");

const data =
await response.json();

let html="";

data.forEach(emp=>{

html +=
`<li>${emp.name}
- ${emp.department}</li>`;

});

document.getElementById(
"employees"
).innerHTML=html;
}

async function saveEmployee(){

const name=
document.getElementById("name").value;

const department=
document.getElementById("department").value;

await fetch(
API+"/employees",
{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
name,
department
})
});

loadEmployees();
}

loadEmployees();

</script>

</body>
</html>
